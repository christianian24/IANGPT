<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IAN GPT Assistant</title>
    <link rel="icon" type="image/png" href="/static/darkmodelogo.png" id="favicon">
    <link rel="stylesheet" href="/static/style.css?v=3">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked-katex-extension/lib/index.umd.js"></script>
</head>

<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside id="sidebar" class="sidebar">
            <div class="sidebar-header">
                <button id="new-chat-btn" class="new-chat-btn">
                    <svg stroke="currentColor" fill="none" stroke-width="2" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round" class="w-4 h-4" height="1em" width="1em" xmlns="http://www.w3.org/2000/svg"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                    New Chat
                </button>
                <button id="close-sidebar" class="icon-btn" title="Close sidebar">
                    <svg stroke="currentColor" fill="none" stroke-width="2" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round" class="w-4 h-4" height="1em" width="1em" xmlns="http://www.w3.org/2000/svg"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="9" y1="3" x2="9" y2="21"></line></svg>
                </button>
            </div>
            
            <div class="sidebar-search">
                <input type="text" id="search-chat" placeholder="Search chats..." />
            </div>

            <div class="sidebar-history-container">
                <ul id="chat-list" class="chat-list">
                    <!-- Chats will be injected here -->
                </ul>
            </div>
            
            <div class="sidebar-footer">
                <button class="settings-btn" id="settings-btn">
                    <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
                    Settings
                </button>
            </div>
        </aside>

        <!-- Main Content area -->
        <div class="main-wrapper empty-chat">
            <header class="app-header">
                <div class="header-left">
                    <button id="open-sidebar" class="icon-btn" style="display: none;" title="Open sidebar">
                        <svg stroke="currentColor" fill="none" stroke-width="2" viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round" class="w-4 h-4" height="1em" width="1em" xmlns="http://www.w3.org/2000/svg"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="9" y1="3" x2="9" y2="21"></line></svg>
                    </button>
                    <div class="logo">
                        <img src="/static/Lightmodelogo.png" class="logo-light" alt="IAN GPT Logo" width="24" height="24" style="object-fit: contain; margin-right: 8px;">
                        <img src="/static/darkmodelogo.png" class="logo-dark" alt="IAN GPT Logo" width="24" height="24" style="object-fit: contain; margin-right: 8px;">
                        IAN GPT
                    </div>
                </div>
            </header>

            <main id="chat-container" class="chat-container">
                <!-- Messages will be injected here dynamically -->
            </main>

            <div class="input-wrapper">
                <h1 class="empty-chat-greeting">Hey, Ready to dive in?</h1>
                <form id="chat-form">
                    <textarea id="user-input" placeholder="Message Reasoning AI..." rows="1" autofocus required></textarea>
                    <button type="submit" id="send-button">
                        <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="3" fill="none"
                            stroke-linecap="round" stroke-linejoin="round">
                            <line x1="12" y1="19" x2="12" y2="5"></line>
                            <polyline points="5 12 12 5 19 12"></polyline>
                        </svg>
                    </button>
                </form>
            </div>
        </div>
    </div>

    <!-- Delete Custom Modal -->
    <div id="delete-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <h3>Delete chat?</h3>
            <p class="delete-warning">This will delete <strong id="delete-chat-name"></strong>.</p>
            <p class="delete-subtext">Visit <a href="#">settings</a> to delete any memories saved during this chat.</p>
            <div class="modal-actions">
                <button id="cancel-delete-btn" class="modal-btn cancel-btn">Cancel</button>
                <button id="confirm-delete-btn" class="modal-btn confirm-btn">Delete</button>
            </div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div id="settings-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content settings-content">
            <div class="settings-sidebar">
                <button class="settings-nav-btn active" data-target="settings-general">General</button>
                <button class="settings-nav-btn" data-target="settings-data">Data controls</button>
            </div>
            <div class="settings-main">
                <button id="close-settings-btn" class="settings-close-btn">&times;</button>
                
                <div id="settings-general" class="settings-panel">
                    <h3 class="settings-section-title">General</h3>
                    <div class="settings-row">
                        <span class="settings-label">Theme</span>
                        <select id="theme-select" class="settings-select">
                            <option value="system">System</option>
                            <option value="light">Light</option>
                            <option value="dark">Dark</option>
                        </select>
                    </div>
                </div>

                <div id="settings-data" class="settings-panel" style="display: none;">
                    <h3 class="settings-section-title">Data controls</h3>
                    <div class="settings-row">
                        <span class="settings-label">Delete all chats</span>
                        <button id="delete-all-chats-btn" class="modal-btn confirm-btn" style="flex: 0 0 auto; padding: 6px 16px; border-radius: 6px;">Delete all</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="/static/app.js"></script>
</body>

</html>
